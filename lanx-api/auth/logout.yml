info:
  name: logout
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/auth/logout"
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const body = res.getBody();
        const accessToken = body?.data?.accessToken;

        if (accessToken) {
          bru.setEnvVar("accessToken", accessToken);
        } else {
          console.log("Access token setting failed");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
