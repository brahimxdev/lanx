info:
  name: 10 list sessions
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/auth/sessions?status=active&sortBy=lastUsedAt&sortOrder=desc&limit=10&page=1"
  params:
    - name: status
      value: active
      type: query
    - name: sortBy
      value: lastUsedAt
      type: query
    - name: sortOrder
      value: desc
      type: query
    - name: limit
      value: "10"
      type: query
    - name: page
      value: "1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
