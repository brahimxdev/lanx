info:
  name: change password
  type: http
  seq: 7

http:
  method: PATCH
  url: "{{baseUrl}}/account/password"
  body:
    type: json
    data: |-
      {
        "existingPassword": "neWass3!!!",
        "newPassword": "freshPass234!!!"
      }
  auth:
    type: bearer
    token: ""

runtime:
  scripts:
    - type: before-request
      code: |-
        const accessToken = bru.getEnvVar("accessToken");

        if (accessToken) {
          req.setHeader("Authorization", `Bearer ${accessToken}`);
        } else {
          console.warn("No access token found — request may fail authentication.");
        }

        //

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
