info:
  name: list sessions
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/account/sessions?status=active&sortBy=lastUsedAt&sortOrder=desc&limit=5&page=1"
  params:
    - name: status
      value: active
      type: query
    - name: sortBy
      value: lastUsedAt
      type: query
    - name: sortOrder
      value: desc
      type: query
    - name: limit
      value: "5"
      type: query
    - name: page
      value: "1"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const accessToken = bru.getEnvVar("accessToken");

        if (accessToken) {
          req.setHeader("Authorization", `Bearer ${accessToken}`);
        } else {
          console.warn("No access token found — request may fail authentication.");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
