info:
  name: 07 change password
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/auth/change-password"
  body:
    type: json
    data: |-
      {
        "existingPassword": "IBRahim123!!!",
        "newPassword": "randomPass222"
      }
  auth:
    type: bearer
    token: ""

runtime:
  scripts:
    - type: before-request
      code: |-
        const accessToken = bru.getEnvVar("accessToken");

        if (accessToken) {
          req.setHeader("Authorization", `Bearer ${accessToken}`);
        } else {
          console.warn("No access token found — request may fail authentication.");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
